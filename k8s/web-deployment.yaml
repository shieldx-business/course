apiVersion: apps/v1
kind: Deployment
metadata:
  name: ascendly-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ascendly-web
  template:
    metadata:
      labels:
        app: ascendly-web
    spec:
      containers:
        - name: web
          image: ascendly-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://ascendly-api:8000"
