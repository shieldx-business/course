name: Deploy staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run typecheck
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
        working-directory: apps/api
      - run: pytest
        working-directory: apps/api

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:staging-${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:staging-${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && vars.STAGING_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        if: env.KUBECONFIG_DATA != ''
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Deploy to staging Kubernetes
        if: env.KUBECONFIG_DATA != ''
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:staging-${{ github.sha }}
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:staging-${{ github.sha }}
        run: |
          kubectl set image deployment/ascendly-api api="$API_IMAGE" --namespace=default
          kubectl set image deployment/ascendly-web web="$WEB_IMAGE" --namespace=default
          kubectl rollout status deployment/ascendly-api --namespace=default --timeout=120s
          kubectl rollout status deployment/ascendly-web --namespace=default --timeout=120s
